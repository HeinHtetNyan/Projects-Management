<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard{% endblock %} — {{ app_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-link { @apply flex items-center gap-2.5 px-3 py-2 rounded-md text-sm transition-colors; }
    .sidebar-link-active { @apply bg-indigo-600 text-white font-medium; }
    .sidebar-link-inactive { @apply text-slate-300 hover:bg-slate-700 hover:text-white; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 antialiased">

{% if user %}
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 bg-slate-900 text-white flex flex-col">
    <!-- Brand -->
    <div class="px-4 py-5 border-b border-slate-700">
      <div class="text-base font-bold tracking-tight">{{ app_name }}</div>
      <div class="text-xs text-slate-400 mt-0.5">License Control</div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto p-2 space-y-0.5">
      <a href="/admin/dashboard"
         class="sidebar-link {% if active_page == 'dashboard' %}sidebar-link-active{% else %}sidebar-link-inactive{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/>
        </svg>
        Dashboard
      </a>

      <a href="/admin/projects"
         class="sidebar-link {% if active_page == 'projects' %}sidebar-link-active{% else %}sidebar-link-inactive{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v8.25m19.5 0v.75A2.25 2.25 0 0 1 19.5 17.25h-15A2.25 2.25 0 0 1 2.25 15v-.75"/>
        </svg>
        Projects
      </a>

      <a href="/admin/customers"
         class="sidebar-link {% if active_page == 'customers' %}sidebar-link-active{% else %}sidebar-link-inactive{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/>
        </svg>
        Customers
      </a>

      <a href="/admin/tokens"
         class="sidebar-link {% if active_page == 'tokens' %}sidebar-link-active{% else %}sidebar-link-inactive{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 0 1 21.75 8.25Z"/>
        </svg>
        Tokens
      </a>

      <a href="/admin/licenses"
         class="sidebar-link {% if active_page == 'licenses' %}sidebar-link-active{% else %}sidebar-link-inactive{% endif %}">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
        </svg>
        Licenses
      </a>
    </nav>

    <!-- User footer -->
    <div class="border-t border-slate-700 p-3">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs font-medium text-slate-200">{{ user.username }}</p>
          <p class="text-xs text-slate-400">Administrator</p>
        </div>
        <a href="/admin/logout"
           class="text-xs text-slate-400 hover:text-red-400 transition-colors px-2 py-1 rounded"
           title="Logout">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
          </svg>
        </a>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="bg-white border-b border-gray-200 h-14 flex items-center px-6 flex-shrink-0">
      <h1 class="text-sm font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

{% else %}
  {% block auth_content %}{% endblock %}
{% endif %}

</body>
</html>
